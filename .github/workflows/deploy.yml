name: Deploy to Live Server (Self-Hosted Optim)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Identify Changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            package:
              - 'package-lock.json'
            prisma:
              - 'prisma/schema.prisma'
            src:
              - 'src/**'
              - 'public/**'
              - 'next.config.ts'
              - 'next.config.js'
              - 'package.json'
              - '.github/workflows/deploy.yml'

      - name: Restore Next.js Cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('src/**') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Install Dependencies
        if: steps.filter.outputs.package == 'true' || steps.filter.outputs.src == 'true'
        run: npm ci

      - name: Copy .env from production folder
        run: |
          if [ -f "/www/wwwroot/newppdb/.env" ]; then
            cp /www/wwwroot/newppdb/.env .
          elif [ -f "../../.env" ]; then
            cp ../../.env .
          fi

      - name: Generate Prisma Client
        if: steps.filter.outputs.prisma == 'true' || steps.filter.outputs.package == 'true' || steps.filter.outputs.src == 'true'
        run: npx prisma generate

      - name: Push Database Changes
        if: steps.filter.outputs.prisma == 'true'
        run: npx prisma db push --accept-data-loss

      - name: Build Application
        if: steps.filter.outputs.src == 'true'
        run: npm run build

      - name: Deploy to Production Directory
        if: steps.filter.outputs.src == 'true'
        run: |
          # 1. Sync Standalone Server Files (Safer Flags, No Root Delete)
          # We use -rtvz to avoid permission errors (don't preserve owner/group)
          # We remove --delete from root to preserve src/ and other server-side folders
          rsync -rtvz .next/standalone/ /www/wwwroot/newppdb/
          
          # 2. Sync Static Assets (Incremental & Clean)
          mkdir -p /www/wwwroot/newppdb/.next/static
          rsync -rtvz --delete .next/static/ /www/wwwroot/newppdb/.next/static/
          
          # 3. Sync Public Assets (Incremental, Excluding uploads)
          rsync -rtvz --delete --exclude 'uploads' public/ /www/wwwroot/newppdb/public/

      - name: Restart Application
        if: steps.filter.outputs.src == 'true'
        run: |
          cd /www/wwwroot/newppdb
          pm2 restart newppdb || pm2 start server.js --name "newppdb"
