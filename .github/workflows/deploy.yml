name: Deploy to Live Server (Self-Hosted)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: npm install

      - name: Copy .env from production folder
        run: |
          # Change this path to your actual .env location if different
          if [ -f "/www/wwwroot/newppdb/.env" ]; then
            cp /www/wwwroot/newppdb/.env .
          elif [ -f "../../.env" ]; then # Fallback for relative paths in runner
            cp ../../.env .
          else
            echo "Warning: .env file not found. Database commands might fail."
          fi

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Push Database Changes
        run: npx prisma db push --accept-data-loss # Be careful with data loss in production, usually use migrations

      - name: Build Application
        run: npm run build

      - name: Deploy to Production Directory
        run: |
          # Sync build result to the actual production folder
          # -a: archive mode, -v: verbose, -z: compress, --delete: remove files in dest that are not in source
          # Excluding node_modules and .git to save time (we already did npm install in previous step, 
          # but usually we sync everything except .git and then npm install/build in dest, 
          # or build in runner and sync build + node_modules)
          
          rsync -avz --delete --exclude '.git' --exclude '.github' --exclude 'node_modules' . /www/wwwroot/newppdb/
          
          # We also need node_modules in production. 
          # Option A: rsync it (slow)
          # Option B: cd and npm install (safer if different node versions, but here it's the same machine)
          rsync -avz --exclude '.git' node_modules /www/wwwroot/newppdb/

      - name: Restart Application
        run: |
          cd /www/wwwroot/newppdb
          pm2 restart newppdb || pm2 start npm --name "newppdb" -- start
