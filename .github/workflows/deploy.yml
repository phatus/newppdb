name: Deploy to Live Server (Self-Hosted)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Identify Changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            package:
              - 'package-lock.json'
            prisma:
              - 'prisma/schema.prisma'
            src:
              - 'src/**'
              - 'public/**'
              - 'next.config.ts'
              - 'next.config.js'
              - 'package.json'
              - 'prisma/schema.prisma'

      - name: Install Dependencies
        if: steps.filter.outputs.package == 'true'
        run: npm install

      - name: Copy .env from production folder
        run: |
          if [ -f "/www/wwwroot/newppdb/.env" ]; then
            cp /www/wwwroot/newppdb/.env .
          elif [ -f "../../.env" ]; then
            cp ../../.env .
          fi

      - name: Generate Prisma Client
        if: steps.filter.outputs.prisma == 'true' || steps.filter.outputs.package == 'true'
        run: npx prisma generate

      - name: Push Database Changes
        if: steps.filter.outputs.prisma == 'true'
        run: npx prisma db push --accept-data-loss

      - name: Build Application
        if: steps.filter.outputs.src == 'true'
        run: npm run build

      - name: Deploy to Production Directory
        if: steps.filter.outputs.src == 'true'
        run: |
          rsync -avz --delete --exclude '.git' --exclude '.github' --exclude 'node_modules' --exclude 'public/uploads' . /www/wwwroot/newppdb/
          rsync -avz --exclude '.git' --exclude 'public/uploads' node_modules /www/wwwroot/newppdb/

      - name: Restart Application
        if: steps.filter.outputs.src == 'true'
        run: |
          cd /www/wwwroot/newppdb
          pm2 restart newppdb || pm2 start npm --name "newppdb" -- start
